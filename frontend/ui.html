<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-stone-900/70 backdrop-blur-md shadow-[0px_20px_40px_rgba(45,52,51,0.05)]">
<div class="flex justify-between items-center px-8 py-6 w-full">
<button class="flex items-center text-stone-600 dark:text-stone-300 active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Manrope'] text-sm tracking-tight font-semibold text-stone-900">New Product</h1>
<button class="font-['Manrope'] text-sm tracking-tight text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100 transition-colors active:opacity-70">
                Publish
            </button>
</div>
<div class="bg-stone-100/50 dark:bg-stone-800/50 h-px w-full"></div>
</header>
<main class="pt-32 pb-48 px-6 max-w-5xl mx-auto min-h-screen">
<!-- Editorial Header Section -->
<section class="mb-20 text-center md:text-left">
<span class="text-xs tracking-[0.2em] uppercase text-outline mb-4 block font-medium">Curator Portal</span>
<h2 class="text-4xl md:text-6xl font-light tracking-tight text-on-surface leading-tight">
                Define your <br/><span class="italic font-normal">masterpiece.</span>
</h2>
</section>
<!-- Form Canvas -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
<!-- Left Column: Primary Fields -->
<form class="lg:col-span-7 space-y-16">
<!-- Text Inputs Group -->
<div class="space-y-12">
<div class="group">
<label class="block text-[10px] uppercase tracking-widest text-outline mb-3 font-semibold" for="title">Product Title</label>
<input class="w-full bg-transparent border-none p-0 text-2xl font-headline font-light placeholder:text-surface-variant focus:ring-0" id="title" placeholder="Give it a soulful name..." type="text"/>
<div class="h-px w-full bg-surface-container mt-2 group-focus-within:bg-primary transition-colors duration-500"></div>
</div>
<div class="group">
<label class="block text-[10px] uppercase tracking-widest text-outline mb-3 font-semibold" for="description">Description</label>
<textarea class="w-full bg-transparent border-none p-0 text-lg leading-relaxed placeholder:text-surface-variant focus:ring-0 resize-none" id="description" placeholder="Tell the story behind this creation..." rows="5"></textarea>
<div class="h-px w-full bg-surface-container mt-2 group-focus-within:bg-primary transition-colors duration-500"></div>
</div>
</div>
<!-- Price Section -->
<div class="bg-surface-container-low rounded-xl p-8 space-y-8">
<h3 class="text-sm font-headline uppercase tracking-widest text-on-surface-variant">Commercial Details</h3>
<div class="flex flex-col md:flex-row gap-8">
<div class="flex-1">
<label class="block text-[10px] uppercase tracking-widest text-outline mb-3" for="amount">Amount</label>
<input class="w-full bg-surface-container-lowest rounded-lg border-none ghost-border py-4 px-6 text-xl focus:bg-surface-container-high transition-colors focus:ring-0" id="amount" placeholder="0.00" type="number"/>
</div>
<div class="w-full md:w-40">
<label class="block text-[10px] uppercase tracking-widest text-outline mb-3" for="currency">Currency</label>
<select class="w-full bg-surface-container-lowest rounded-lg border-none ghost-border py-4 px-6 appearance-none focus:bg-surface-container-high transition-colors focus:ring-0" id="currency">
<option>USD</option>
<option>EUR</option>
<option>GBP</option>
<option>JPY</option>
</select>
</div>
</div>
</div>
</form>
<!-- Right Column: Media Gallery -->
<div class="lg:col-span-5">
<div class="sticky top-32">
<div class="flex justify-between items-end mb-6">
<div>
<label class="block text-[10px] uppercase tracking-widest text-outline mb-2 font-semibold">Visual Gallery</label>
<p class="text-xs text-on-surface-variant">Curate up to 7 perspectives.</p>
</div>
<span class="text-xs font-medium text-primary">0 / 7</span>
</div>
<!-- Bento Grid for Images -->
<div class="grid grid-cols-4 grid-rows-3 gap-3 aspect-square">
<!-- Main Image Slot -->
<div class="col-span-2 row-span-2 bg-surface-container-high rounded-xl relative group overflow-hidden flex items-center justify-center cursor-pointer hover:bg-surface-variant transition-colors">
<div class="text-center z-10 p-4">
<span class="material-symbols-outlined text-outline text-3xl mb-2" data-icon="add_photo_alternate">add_photo_alternate</span>
<p class="text-[10px] uppercase tracking-tighter text-outline font-semibold">Hero Image</p>

</div>
<!-- Secondary Slots -->
<div class="bg-surface-container-low rounded-xl flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-outline-variant text-xl" data-icon="image">image</span>
</div>
<div class="bg-surface-container-low rounded-xl flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-outline-variant text-xl" data-icon="image">image</span>
</div>
<div class="bg-surface-container-low rounded-xl flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-outline-variant text-xl" data-icon="image">image</span>
</div>
<div class="bg-surface-container-low rounded-xl flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-outline-variant text-xl" data-icon="image">image</span>
</div>
<div class="bg-surface-container-low rounded-xl flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-outline-variant text-xl" data-icon="image">image</span>
</div>
<div class="bg-surface-container-low rounded-xl flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-outline-variant text-xl" data-icon="image">image</span>
</div>
</div>
<div class="mt-8 p-6 bg-surface-container-lowest rounded-xl ghost-border flex items-start gap-4">
<span class="material-symbols-outlined text-primary-dim mt-0.5" data-icon="lightbulb">lightbulb</span>
<p class="text-xs leading-relaxed text-on-surface-variant italic">
                            Pro tip: Higher resolution images with natural lighting tend to engage curators more effectively.
                        </p>
</div>
</div>
</div>
</div>
